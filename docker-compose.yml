# **Các bước thực hiện:**

# 1. **Tạo một thư mục dự án:**
# Tạo một thư mục mới cho dự án của bạn, ví dụ: `sql_assignments`.
# 2. **Tạo file `docker-compose.yml`:**
# Bên trong thư mục `sql_assignments`, tạo một file có tên là `docker-compose.yml` và dán nội dung sau vào:
# 3. **Khởi chạy Container:**
# Mở terminal hoặc command prompt, di chuyển vào thư mục `sql_assignments` và chạy lệnh:

#     ```bash
#     docker-compose up -d
#     ```
#     Lệnh này sẽ tải image PostgreSQL về (nếu chưa có) và khởi chạy container ở chế độ nền (`-d` là detached).

version: "3.8"

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network

  # MySQL
  mysql:
    image: mysql:latest
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql_db
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db_network

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - db_network

  # Microsoft SQL Server
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql_db
    restart: always
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: mysqlserver # user: SA
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - db_network

  # Adminer để quản lý PostgreSQL, MySQL và MSSQL
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mysql
      - mssql
    networks:
      - db_network

  # Mongo Express để quản lý MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongo
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongo
      ME_CONFIG_MONGODB_URL: mongodb://mongo:mongo@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - db_network

networks:
  db_network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  mongodb_data:
  mssql_data:
